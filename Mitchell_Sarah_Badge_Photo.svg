<svg xmlns="http://www.w3.org/2000/svg" width="600" height="780" viewBox="0 0 600 780">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B3A5C"/>
      <stop offset="100%" style="stop-color:#2C5F8A"/>
    </linearGradient>
    <linearGradient id="avatar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8B4F8"/>
      <stop offset="100%" style="stop-color:#9C7CC9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="20" y="20" width="560" height="740" rx="16" fill="url(#bg)" filter="url(#shadow)" stroke="#dee2e6" stroke-width="1"/>

  <!-- Company header bar -->
  <rect x="20" y="20" width="560" height="90" rx="16" fill="url(#header)"/>
  <rect x="20" y="80" width="560" height="30" fill="url(#header)"/>

  <!-- Company name -->
  <text x="300" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="bold" letter-spacing="3">ACME CORPORATION</text>
  <text x="300" y="82" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="12" letter-spacing="1.5">EMPLOYEE IDENTIFICATION</text>

  <!-- Photo area -->
  <rect x="150" y="140" width="300" height="300" rx="12" fill="white" stroke="#dee2e6" stroke-width="1"/>

  <!-- Avatar circle -->
  <circle cx="300" cy="270" r="110" fill="url(#avatar)"/>

  <!-- Initials -->
  <text x="300" y="290" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="72" font-weight="600">SM</text>

  <!-- Camera icon overlay hint -->
  <circle cx="380" cy="350" r="22" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <g transform="translate(368, 338)">
    <path d="M5 7h2l1.5-2h7L17 7h2a1 1 0 011 1v8a1 1 0 01-1 1H5a1 1 0 01-1-1V8a1 1 0 011-1z" fill="none" stroke="#6c757d" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="3" fill="none" stroke="#6c757d" stroke-width="1.5"/>
  </g>

  <!-- Name -->
  <text x="300" y="490" text-anchor="middle" fill="#1B3A5C" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Sarah J. Mitchell</text>

  <!-- Title -->
  <text x="300" y="520" text-anchor="middle" fill="#6c757d" font-family="Arial, sans-serif" font-size="16">Marketing Specialist II — Brand Strategy</text>

  <!-- Divider -->
  <line x1="100" y1="550" x2="500" y2="550" stroke="#dee2e6" stroke-width="1"/>

  <!-- Details grid -->
  <text x="100" y="585" fill="#868e96" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">EMPLOYEE ID</text>
  <text x="100" y="605" fill="#2d2d2d" font-family="'Courier New', monospace" font-size="16">EMP-2026-0847</text>

  <text x="350" y="585" fill="#868e96" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">DEPARTMENT</text>
  <text x="350" y="605" fill="#2d2d2d" font-family="Arial, sans-serif" font-size="16">Marketing</text>

  <text x="100" y="645" fill="#868e96" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">LOCATION</text>
  <text x="100" y="665" fill="#2d2d2d" font-family="Arial, sans-serif" font-size="16">Austin, TX (Hybrid)</text>

  <text x="350" y="645" fill="#868e96" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">START DATE</text>
  <text x="350" y="665" fill="#2d2d2d" font-family="Arial, sans-serif" font-size="16">June 1, 2026</text>

  <!-- Badge status -->
  <rect x="200" y="695" width="200" height="30" rx="15" fill="#E7F4EC"/>
  <text x="300" y="715" text-anchor="middle" fill="#2A7A45" font-family="Arial, sans-serif" font-size="12" font-weight="bold">PRE-HIRE · BADGE PENDING</text>
</svg>