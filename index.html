<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI HOW — Demos</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#f4f5f7;color:#293E40;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .container{max-width:480px;width:100%;padding:40px 24px;text-align:center}

  a.card:hover{border-color:#1f8476;box-shadow:0 2px 8px rgba(31,132,118,.12)}

</head>
<body>
<div class="container">
  <h1>AI HOW</h1>
  <p>Interactive application simulations</p>
  <div class="links">
    <a class="card" href="servicenow-sim.html">
      ServiceNow — Incident Management
      <div class="sub">IT service desk with ticket list and detail views</div>
    </a>
    <a class="card" href="workday-sim.html">
